<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carousel TikFinity</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Luckiest Guy', cursive;
      background-color: transparent;
      color: #ffffff;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .carousel-container {
      width: 100%;
      overflow: hidden;
      position: relative;
      margin-top: 20px;
      height: 250px;
    }

    .carousel {
      position: relative;
      height: 250px;
      width: 100%;
      overflow: visible;
    }

    .event-card {
      position: absolute;
      top: 0;
      left: 50%;
      width: 220px;
      height: 250px;
      border-radius: 20px;
      padding: 10px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%);
      transition: opacity 0.8s ease-in-out;
      z-index: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .event-card.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 10;
    }

    .card-visual {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .gift-img {
      position: absolute;
      inset: 0;
      width: 85%;
      height: 85%;
      object-fit: contain;
      filter: drop-shadow(0px 5px 10px rgba(0, 0, 0, 0.4));
    }

    .reward-img {
      position: absolute;
      right: 8px;
      bottom: 52px;
      width: 85px;
      height: 85px;
      object-fit: contain;
      image-rendering: auto;
      filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.55));
      z-index: 2;
      pointer-events: none;
    }

    .action {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.2;
      text-shadow:
        -3px -3px 0 #000,
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div class="carousel-container">
    <div class="carousel" id="carousel">

      <div class="event-card active">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/968820bc85e274713c795a6aef3f7c67~tplv-obj.webp" alt="Cono de helado" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/FireFlower.gif" alt="Flor de fuego">
          <div class="action">Flor</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/d56945782445b0b8c8658ed44f894c7b~tplv-obj.webp" alt="Quiéreme" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/1upMushroom.png" alt="Vida extra">
          <div class="action">Vida</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/3f02fa9594bd1495ff4e8aa5ae265eef~tplv-obj.webp" alt="GG" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/SuperStar.gif" alt="Estrella">
          <div class="action">Estrella</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/a2d81f3847457be9083a9c76a59b08cb~tplv-obj.webp" alt="Rosa blanca" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/CapeFeather.png" alt="Pluma">
          <div class="action">Pluma</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/802a21ae29f9fae5abe3693de9f874bd~tplv-obj.webp" alt="TikTok" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/SuperMushroom.png" alt="Champiñón">
          <div class="action">Champiñon</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/maliva/webcast-va/eba3a9bb85c33e017f3648eaf88d7189~tplv-obj.webp" alt="Rosa" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/GoombaL.gif" alt="Hongo cruel">
          <div class="action">Hongo Cruel</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/alisg/webcast-sg/resource/b342e28d73dac6547e0b3e2ad57f6597.png~tplv-obj.webp" alt="Hazte popular" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/KoopaYellowL.gif" alt="Tortuga vil">
          <div class="action">Tortuga Vil</div>
        </div>
      </div>

      <div class="event-card">
        <div class="card-visual">
          <img class="gift-img" src="https://p16-webcast.tiktokcdn.com/img/alisg/webcast-sg/resource/d686d45bd66e16b0aca8b0e5eb52a977.png~tplv-obj.webp" alt="Creeper" coin="1">
          <img class="reward-img" src="https://www.snesmaps.com/maps/SuperMarioWorld/sprites/Cheep-CheepOutOfWaterL.gif" alt="Pez bomba">
          <div class="action">Pez Bomba</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.event-card');
    let currentIndex = 0;

    function showNextCard() {
      cards.forEach(card => card.classList.remove('active'));
      cards[currentIndex].classList.add('active');
      currentIndex = (currentIndex + 1) % cards.length;
    }

    showNextCard();
    setInterval(showNextCard, 3000);
  </script>
</body>
</html>
